<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./main.css">
    <title>pratica_eventos13</title>
</head>
<body>
    <form id="formulario">
    <h2>Insira seu nome</h2>
    <input id="campo-nome" type="text" placeholder="nome">
    <p id="feedback-nome"></p>
    <h2>Insira seu email</h2>
    <input id="campo-email" type="email" placeholder="email">
    <p id="feedback-email"></p>
    <h2>Insira sua senha</h2>
    <input id="campo-senha" type="password" placeholder="senha">
    <p id="feedback-geral"></p>
    <p id="feedback-senha"></p>
    <button id="btn" type="submit">Confirme</button>
    </form>
    <script src="./main.js"></script>
</body>
</html>
